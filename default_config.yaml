#       enabled: true
#       provider: openai_compatible   # openai_compatible | elevenlabs | custom_http | local_whisper
#       base_url: "http://litellm.internal:4000/v1"
#       endpoint: ""                  # optional override, if empty provider default is used
#       api_key: "${LITELLM_API_KEY}"
#       model: "whisper-1"
#       language: "de"
#       timeout_sec: 60
#
#     tts:
#       enabled: true
#       provider: openai_compatible   # openai_compatible | elevenlabs | custom_http | kokoro_local
#       base_url: "http://litellm.internal:4000/v1"
#       endpoint: ""                  # optional override
#       api_key: "${LITELLM_API_KEY}"
#       model: "gpt-4o-mini-tts"
#       voice: "alloy"               # for elevenlabs set voice_id here
#       format: "opus"               # openai: opus/mp3/wav... | elevenlabs: mp3_44100_128 etc.
#       timeout_sec: 60
#
#     reply:
#       optimize_output_default: auto   # auto | off | voice | text — auto adapts style to voice mode per turn; /optimize_output overrides per session

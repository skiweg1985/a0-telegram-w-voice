bots: []
# Example bot:
# - name: my_bot
#   enabled: true
#   notify_messages: false       # Show a WebUI notification for each incoming Telegram message.
#   token: ""
#   mode: polling                # polling or webhook
#   webhook_url: ""              # required if mode=webhook, your A0 base URL e.g. https://yourdomain.com (webhook path appended automatically)
#   webhook_secret: ""           # optional shared secret for webhook verification
#   allowed_users: []            # Telegram user IDs or @usernames. Empty = allow all.
#   group_mode: mention          # mention (respond when @mentioned or replied to) | all (respond to every message) | off (ignore groups)
#   welcome_enabled: false       # Send a greeting when someone joins the group
#   welcome_message: ""          # Welcome template. Use {name} for the new member's name. Default: "Welcome, {name}!"
#   user_projects: {}            # Map Telegram user_id to project name, e.g. { "123456": "my_project" }
#   default_project: ""          # Fallback project if user not in user_projects
#   attachment_max_age_hours: 0  # Hours to keep downloaded attachments. 0 = keep forever.
#   agent_instructions: ""       # Extra instructions for the agent in Telegram chats
#   # The WebUI exposes the common settings below. Keys marked "(YAML only)" are not
#   # shown in the WebUI but are read from this file and preserved across UI edits.
#
#   # Tool-run status in chat (`smart` / `debug` may include redacted tool args)
#   telegram_detail_level: info                 # off | info | smart | debug (verbose in chat) — default info; /detail can override per session
#   telegram_detail_execute_before: true        # show the progress line when a tool starts; completion replaces that same line by default
#   telegram_detail_info_min_interval_sec: 5    # (YAML only)
#   telegram_detail_debug_min_interval_sec: 1.5 # (YAML only, used for smart/debug)
#   telegram_detail_exclude_tools: []           # (YAML only)
#   telegram_detail_tool_labels: {}             # (YAML only) e.g. { "code_execution": "Run code" }
#   telegram_detail_icons_enabled: true         # (YAML only) Prefix each step with an emoji icon
#   telegram_detail_tool_icons: {}              # (YAML only) Override icons, e.g. { "memory_load": "📌" }
#   telegram_detail_max_body_chars: 3200        # (YAML only) Max chars for smart/debug detail body (truncated if longer)
#
#   rich_messages:
#     enabled: false        # Bot API rich final replies for tables/task lists/headings/details/math (opt-in)
#     drafts_enabled: false # reserved separate opt-in for rich live draft previews

#
#   # Voice/STT/TTS
#   progress:
#     edit_throttle_ms: 200        # (YAML only) Minimum delay between progress edits
#     completed_mode: delete       # (YAML only) delete | none | edit — cleanup leftover progress; never leave "Completed" by default
#     live_response_preview_interval_ms: 800      # (YAML only) Hermes-style max preview cadence
#     live_response_preview_buffer_threshold: 24  # (YAML only) Flush early after enough new buffered chars
#     live_response_preview_chars: 1200           # (YAML only) Cap visible draft text to avoid giant Telegram edits
#
#   speech:
#     stt:
#       enabled: true
#       provider: openai_compatible   # openai_compatible | elevenlabs | custom_http | local_whisper
#       base_url: "http://litellm.internal:4000/v1"
#       endpoint: ""                  # (YAML only) optional override, if empty provider default is used
#       api_key: "${LITELLM_API_KEY}"
#       model: "whisper-1"
#       language: "de"                # (YAML only) ISO language hint; empty = auto-detect
#       timeout_sec: 60               # (YAML only)
#
#     tts:
#       enabled: true
#       provider: openai_compatible   # openai_compatible | elevenlabs | custom_http | kokoro_local
#       base_url: "http://litellm.internal:4000/v1"
#       endpoint: ""                  # (YAML only) optional override
#       api_key: "${LITELLM_API_KEY}"
#       model: "gpt-4o-mini-tts"
#       voice: "alloy"               # for elevenlabs set voice_id here
#       format: "opus"               # openai: opus/mp3/wav/flac/pcm... | elevenlabs: mp3_44100_128 etc.
#                                   # Telegram voice replies are auto-converted to ogg/opus when needed.
#                                   # For raw PCM input the plugin assumes s16le / 24000 Hz / mono by default.
#       timeout_sec: 60               # (YAML only)
#
#     reply:
#       optimize_output_default: off    # (YAML only) off | voice | text | auto — answer style for new sessions; /optimize_output overrides per session
#       voice_mode: auto               # off | auto | voice_only | voice_text | text_only
#                                      # (legacy "force" + also_send_text still accepted)
#       max_chars: 700                 # cap text length for TTS
#       quick_actions:
#         enabled: true                # show optional inline UX buttons under Telegram replies; /actions can disable per session
#         show_text: true              # for voice replies without a visible text bubble, offer a button that reveals the text reply on demand
